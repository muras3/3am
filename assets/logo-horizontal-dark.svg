<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 48" width="160" height="48">
  <!-- Clock face -->
  <circle cx="24" cy="24" r="20" fill="none" stroke="#FAFAF8" stroke-width="2.5"/>
  <!-- Minute hand (12 o'clock) -->
  <line x1="24" y1="24" x2="24" y2="7" stroke="#FAFAF8" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Hour hand (3 o'clock) -->
  <line x1="24" y1="24" x2="38" y2="24" stroke="#FAFAF8" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Center pivot -->
  <circle cx="24" cy="24" r="2" fill="#FAFAF8"/>
  <!-- Alert dot -->
  <circle cx="42" cy="6" r="5" fill="#E85D3A"/>
  <!-- Wordmark -->
  <text x="56" y="33" font-family="'DM Sans','Helvetica Neue',Helvetica,Arial,sans-serif" font-size="30" font-weight="700" letter-spacing="-0.5" fill="#FAFAF8">3am</text>
</svg>
