name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - develop

# Cancel in-flight deploys when a newer commit lands on develop
concurrency:
  group: deploy-cf-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Receiver to CF Workers
    runs-on: ubuntu-latest
    # Only run after CI passes (ci.yml must succeed on the same commit)
    needs: []
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build all packages
        run: pnpm build

      - name: Deploy to Cloudflare Workers
        run: pnpm --filter @3am/receiver exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
