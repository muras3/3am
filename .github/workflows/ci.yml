name: CI

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main
  merge_group:

jobs:
  test:
    name: Test, Typecheck & Lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: receiver
          POSTGRES_PASSWORD: receiver
          POSTGRES_DB: receiver
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U receiver"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      # core
      - name: Build core
        run: pnpm --filter @3amoncall/core build
      - name: Test core
        run: pnpm --filter @3amoncall/core test
      - name: Typecheck core
        run: pnpm --filter @3amoncall/core typecheck
      - name: Lint core
        run: pnpm --filter @3amoncall/core lint

      # diagnosis (no real API calls — all mocked in tests)
      - name: Build diagnosis
        run: pnpm --filter @3amoncall/diagnosis build
      - name: Test diagnosis
        run: pnpm --filter @3amoncall/diagnosis test
      - name: Typecheck diagnosis
        run: pnpm --filter @3amoncall/diagnosis typecheck
      - name: Lint diagnosis
        run: pnpm --filter @3amoncall/diagnosis lint

      # cli (no real API calls — all mocked in tests)
      - name: Build cli
        run: pnpm --filter @3amoncall/cli build
      - name: Test cli
        run: pnpm --filter @3amoncall/cli test
      - name: Typecheck cli
        run: pnpm --filter @3amoncall/cli typecheck
      - name: Lint cli
        run: pnpm --filter @3amoncall/cli lint

      # receiver (PostgresAdapter tests run when DATABASE_URL is set)
      - name: Test receiver
        run: pnpm --filter @3amoncall/receiver test
        env:
          DATABASE_URL: postgres://receiver:receiver@localhost:5432/receiver
      - name: Typecheck receiver
        run: pnpm --filter @3amoncall/receiver typecheck
      - name: Lint receiver
        run: pnpm --filter @3amoncall/receiver lint

      # console
      - name: Build console
        run: pnpm --filter @3amoncall/console build
      - name: Test console
        run: pnpm --filter @3amoncall/console test
      - name: Typecheck console
        run: pnpm --filter @3amoncall/console typecheck
      - name: Typecheck console E2E
        run: pnpm --filter @3amoncall/console typecheck:e2e
      - name: Lint console
        run: pnpm --filter @3amoncall/console lint

      # console E2E (Playwright — Chromium only)
      - name: Install Playwright browsers
        run: pnpm --filter @3amoncall/console exec playwright install chromium --with-deps
      - name: E2E tests (console)
        run: pnpm --filter @3amoncall/console e2e
        env:
          CI: true
          RECEIVER_AUTH_TOKEN: e2e-test-token
