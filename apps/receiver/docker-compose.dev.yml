services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: receiver
      POSTGRES_PASSWORD: receiver
      POSTGRES_DB: receiver
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U receiver"]
      interval: 5s
      timeout: 5s
      retries: 5
