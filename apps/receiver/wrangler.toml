name = "3am-receiver"
main = "src/cf-entry.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat_v2"]

[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true

[observability.traces]
enabled = true
head_sampling_rate = 1.0

[vars]
ALLOW_INSECURE_DEV_MODE = "false"
DIAGNOSIS_MAX_WAIT_MS = "30000"
DIAGNOSIS_GENERATION_THRESHOLD = "15"
RETENTION_HOURS = "48"

[assets]
directory = "../console/dist"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/v1/*", "/healthz"]

[[d1_databases]]
binding = "DB"
database_name = "3am-db"
database_id = "7a20d92c-33ae-4ca4-ae83-05cefefb3183"

[[queues.producers]]
binding = "DIAGNOSIS_QUEUE"
queue = "3am-diagnosis"

[[queues.consumers]]
queue = "3am-diagnosis"
max_batch_size = 1
max_batch_timeout = 1
max_retries = 6
dead_letter_queue = "3am-diagnosis-dlq"
retry_delay = 30
